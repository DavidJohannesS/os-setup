- name: Configure apt sources list
  tags:
    - apt_sources
  block:
    - name: Backup current sources.list
      ansible.builtin.copy:
        src: /etc/apt/sources.list
        dest: /etc/apt/sources.list.bak
        mode: '0644'
      become: true

    - name: Add contrib and non-free to sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '^(deb|deb-src) http://deb.debian.org/debian/ bookworm main'
        line: '\1 http://deb.debian.org/debian/ bookworm main contrib non-free'
      with_items:
        - 'deb http://deb.debian.org/debian/ bookworm main'
        - 'deb-src http://deb.debian.org/debian/ bookworm main'
        - 'deb http://security.debian.org/debian-security bookworm-security main'
        - 'deb-src http://security.debian.org/debian-security bookworm-security main'
        - 'deb http://deb.debian.org/debian/ bookworm-updates main'
        - 'deb-src http://deb.debian.org/debian/ bookworm-updates main'
      become: true

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      become: true
