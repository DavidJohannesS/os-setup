---
- name: Create a new user
  ansible.builtin.user:
    name: <username>
    password: <password>
    shell: /bin/bash
    create_home: true

- name: Ensure [user] section exists in wsl.conf
  ansible.builtin.lineinfile:
    path: /etc/wsl.conf
    create: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0655'
    line: "[user]"
    insertafter: EOF
    state: present

- name: Set the default user in WSL
  ansible.builtin.lineinfile:
    path: /etc/wsl.conf
    create: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0655'
    line: "default=<username>"
    insertafter: "[user]"

- name: Fix user pwd promt
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    state: present
    regexp: '^{{ ansible_user }} ALL=\(ALL\) NOPASSWD: ALL'
    line: '{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL'
    validate: 'visudo -cf %s'
